name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require tag commit on master
        run: |
          git fetch origin master --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Require tag to match package version
        run: |
          package_version=$(node -p "require('./package.json').version")
          expected_tag="v${package_version}"
          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version" >&2
            exit 1
          fi

      - name: Install Python test dependency
        run: python -m pip install pytest

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
